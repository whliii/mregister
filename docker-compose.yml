services:
  register-console:
    build:
      context: .
      dockerfile: web_console/Dockerfile
    container_name: register-console
    working_dir: /app
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WEB_CONSOLE_MAX_CONCURRENT_TASKS: "2"
      WEB_CONSOLE_POLL_INTERVAL: "1.0"
      PLAYWRIGHT_BROWSERS_PATH: "/ms-playwright"
    volumes:
      - .:/app
    restart: unless-stopped
