services:
  gptmail-adapter:
    build:
      context: ..
      dockerfile: mail_adapter/Dockerfile
    container_name: gptmail-adapter
    environment:
      ADAPTER_API_KEY: "${ADAPTER_API_KEY:-change-me}"
      ADAPTER_ADMIN_TOKEN: "${ADAPTER_ADMIN_TOKEN:-change-admin-token}"
      ADAPTER_SECRET_KEY: "${ADAPTER_SECRET_KEY:-}"
      ADAPTER_WEB_USERNAME: "${ADAPTER_WEB_USERNAME:-admin}"
      ADAPTER_WEB_PASSWORD: "${ADAPTER_WEB_PASSWORD:-change-this-password}"
      ADAPTER_SYNC_INTERVAL_SECONDS: "${ADAPTER_SYNC_INTERVAL_SECONDS:-12}"
      ADAPTER_MESSAGE_RETENTION_MINUTES: "${ADAPTER_MESSAGE_RETENTION_MINUTES:-120}"
      ADAPTER_MAILBOX_RETENTION_HOURS: "${ADAPTER_MAILBOX_RETENTION_HOURS:-24}"
      ADAPTER_CLEANUP_INTERVAL_SECONDS: "${ADAPTER_CLEANUP_INTERVAL_SECONDS:-300}"
      ADAPTER_DB_PATH: "/app/mail_adapter/data/adapter.db"
    ports:
      - "18787:8787"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/adapter:/app/mail_adapter/data
    restart: unless-stopped
